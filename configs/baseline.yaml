data:
  root: "./data/raw_data"
  split: "./splits/v1.json"
  image_size: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

train:
  seed: 42
  batch_size: 64
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 0

model:
  name: "resnet18"
  num_classes: 29

eval:
  metrics: ["accuracy", "macro_f1"]
  operating_point: "argmax"

output:
  run_directory: "./runs/baseline_v1"
